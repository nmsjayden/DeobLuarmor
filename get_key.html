<!DOCTYPE html>
<html>
<head>
  <script>
  (function () {
    const parts = window.location.pathname.split("/");
    const basePath = "/" + parts[1];
    const params = new URLSearchParams(window.location.search);
    const key = params.get("for");

    if (key) {
      try { sessionStorage.setItem("luarmor_key", key); } catch {}
    }

    // Only redirect if we aren't already on the right URL
    const alreadyCorrect =
      window.location.pathname === basePath + "/get_key" &&
      params.get("for") === (key || "");

    if (!alreadyCorrect) {
      window.location.replace(basePath + "/get_key?for=" + (key || ""));
    }
  })();
  </script>
</head>
<body></body>
</html>
