<!DOCTYPE html>
<html>
<head>
  <script>
  (function () {
    const parts = window.location.pathname.split("/");
    const basePath = "/" + parts[1];
    const params = new URLSearchParams(window.location.search);
    const key = params.get("for");

    if (key) {
      try { sessionStorage.setItem("luarmor_key", key); } catch {}
    }

    // Go back to the main page, carrying the key in the URL
    window.location.replace(basePath + "/?for=" + (key || ""));
  })();
  </script>
</head>
<body></body>
</html>
