<!DOCTYPE html>
<html>
<head>
  <script>
  (function () {
    const parts = window.location.pathname.split("/");
    const basePath = "/" + parts[1];
    const params = new URLSearchParams(window.location.search);
    const key = params.get("for");

    if (key) {
      try { sessionStorage.setItem("luarmor_key", key); } catch {}
    }

    // replaceState updates the URL without reloading — no loop possible
    history.replaceState({}, "", basePath + "/get_key?for=" + (key || ""));
  })();
  </script>
</head>
<body></body>
</html>
